<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerifyAI – AI-Powered Scam Protection</title>
  <style>
    body { margin: 0; background: #0a0a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { max-width: 480px; padding: 40px 24px; }
    h1 { font-size: 28px; font-weight: 700; color: #3CB39B; margin-bottom: 12px; }
    p { font-size: 16px; line-height: 1.6; color: #a0aec0; margin-bottom: 32px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(60,179,155,0.2); border-top-color: #3CB39B; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- Google Ads conversion tracking will be added here once account is set up -->
</head>
<body>
  <div class="container">
    <h1>VerifyAI</h1>
    <p>One photo, one tap, one answer.<br>Redirecting you to the App Store...</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Redirect to App Store with UTM
    var params = new URLSearchParams(window.location.search);
    var utmSource = params.get('utm_source') || 'google_ads';
    var utmMedium = params.get('utm_medium') || 'youtube_shorts';
    var utmCampaign = params.get('utm_campaign') || 'verifyai_us_trial';
    var appStoreUrl = 'https://apps.apple.com/app/id6740724263' +
      '?utm_source=' + encodeURIComponent(utmSource) +
      '&utm_medium=' + encodeURIComponent(utmMedium) +
      '&utm_campaign=' + encodeURIComponent(utmCampaign) +
      '&utm_content=cat_banker_45s';
    setTimeout(function() { window.location.href = appStoreUrl; }, 1500);
  </script>
</body>
</html>
