name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Trigger Cloudflare Pages deploy
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/e69e6d5c-f801-4c1d-996d-b6537d41147d"
          echo "CF Pages deploy triggered"
